[theme]
primaryColor        = "#534AB7"
backgroundColor     = "#FAFAF8"
secondaryBackgroundColor = "#F1EFE8"
textColor           = "#2C2C2A"
font                = "sans serif"

[server]
headless            = true
enableCORS          = false
enableXsrfProtection = true
maxUploadSize       = 50

[browser]
gatherUsageStats    = false
